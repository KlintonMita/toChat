<div class="main">
  <div class="container">
    <h1>Sign Up</h1>
    <div class="container-menu">
      <div class="first-container">
        <h2>Nationality</h2>
        <input type="text" placeholder="Nationality" class="nameInput" >
      </div>
      <div class="second-container">
        <h2>Residence</h2>
        <input type="text" placeholder="Residence" class="surnameInput">
      </div>
      <div class="third-container">
        <h2>Kids</h2>
        <input type="text" placeholder="Kids" class="ageInput">
      </div>
    </div>
    <button (click)="next()">Next</button>
  </div>
</div>
