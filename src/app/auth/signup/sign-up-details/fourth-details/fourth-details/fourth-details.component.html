<div class="main">
  <div class="container">
    <h1>Sign Up</h1>

    <div class="container-menu">
      <div class="first-container">
        <h2>Profile Photo (Optional)</h2>

        <div class="photo-wrapper">
          <img
            *ngIf="signupState.data.imagePreview"
            [src]="signupState.data.imagePreview"
            class="preview"
            alt="Profile Photo"
          />

          <label *ngIf="!signupState.data.imagePreview" class="upload-placeholder">
            +
            <input
              type="file"
              accept="image/*"
              (change)="onFileSelected($event)"
              hidden
            />
          </label>

          <span
            *ngIf="signupState.data.imagePreview"
            class="remove-btn"
            (click)="removeImage()"
          >
            ×
          </span>
        </div>
      </div>
    </div>

    <button (click)="finishSignup()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Finish Sign Up' }}
    </button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
